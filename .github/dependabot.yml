version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    time: "10:00"
  open-pull-requests-limit: 10
  # rollup-plugin-dts 6.4.1 supports TypeScript through v6 only.
  ignore:
  - dependency-name: typescript
    update-types:
    - "version-update:semver-major"
  assignees:
  - ubiubi18
